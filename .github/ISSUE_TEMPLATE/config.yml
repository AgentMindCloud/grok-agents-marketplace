# .github/ISSUE_TEMPLATE/config.yml
blank_issues_enabled: false
contact_links:
  - name: Security vulnerability (private disclosure)
    url: https://github.com/AgentMindCloud/grok-agents-marketplace/security/advisories/new
    about: Never file security issues publicly. Use Private Vulnerability Reporting. See SECURITY.md.
  - name: Questions & discussion
    url: https://github.com/AgentMindCloud/grok-agents-marketplace/discussions
    about: For open-ended questions, ideas, and show-and-tell. Use Discussions, not Issues.
  - name: Agent listing correction
    url: https://github.com/AgentMindCloud/awesome-grok-agents/issues/new
    about: Wrong metadata, broken link, or stale agent? Open the correction in the awesome-grok-agents catalog repo.
