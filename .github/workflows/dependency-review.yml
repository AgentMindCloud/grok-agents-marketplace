name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          allow-licenses: >-
            MIT,
            MIT-0,
            Apache-2.0,
            BSD-2-Clause,
            BSD-3-Clause,
            ISC,
            CC0-1.0,
            CC-BY-4.0,
            0BSD,
            Unlicense,
            BlueOak-1.0.0,
            Python-2.0
          deny-licenses: >-
            GPL-2.0,
            GPL-3.0,
            AGPL-3.0,
            LGPL-2.1,
            LGPL-3.0
