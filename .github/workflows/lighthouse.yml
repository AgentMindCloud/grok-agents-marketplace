name: Lighthouse CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse on Vercel preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Vercel preview deployment
        id: vercel
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          check_interval: 10

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        id: lhci
        with:
          urls: |
            ${{ steps.vercel.outputs.url }}
            ${{ steps.vercel.outputs.url }}/marketplace
            ${{ steps.vercel.outputs.url }}/privacy
            ${{ steps.vercel.outputs.url }}/stats
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.github/lighthouse/lighthouserc.json
        continue-on-error: false

      - name: Comment Lighthouse scores on PR
        if: always() && github.event.pull_request.number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const manifest = `${{ steps.lhci.outputs.manifest }}`;
            const links = `${{ steps.lhci.outputs.links }}`;
            const body = [
              '### Lighthouse CI',
              '',
              'Preview: ${{ steps.vercel.outputs.url }}',
              '',
              '```',
              links || '(no links)',
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
