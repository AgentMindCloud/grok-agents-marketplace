deployment:
  target: x
  runtime: grok-4.20-multi-agent
  region: auto
  scaling:
    min_instances: 0
    max_instances: 4
    concurrency_per_instance: 2
  cost_controls:
    cost_ceiling_usd_per_day: 5
    cost_ceiling_usd_per_thread: 0.50
    on_ceiling_hit: halt_with_alert
  observability:
    logs: grok-native
    traces: grok-native
    metrics: grok-native
  rollout:
    strategy: canary
    canary_percent: 10
    promote_after_minutes: 30
