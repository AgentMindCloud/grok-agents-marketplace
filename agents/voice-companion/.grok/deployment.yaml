deployment:
  target: x
  runtime: grok-4.20-multi-agent
  region: auto_nearest_user
  scaling:
    min_instances: 1           # warm start for voice latency budget
    max_instances: 20
    concurrency_per_instance: 4
    scale_out_on_latency_ms: 450
  cost_controls:
    cost_ceiling_usd_per_day: 8
    cost_ceiling_usd_per_session: 0.20
    on_ceiling_hit: halt_with_alert
  observability:
    logs: grok-native
    traces: grok-native
    metrics: grok-native
    record_latency_percentiles: [p50, p90, p99]
  rollout:
    strategy: canary
    canary_percent: 5
    promote_after_minutes: 45
