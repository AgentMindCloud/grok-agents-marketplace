webhooks:
  - id: voice-dm-trigger
    source: x
    event: voice_dm_received
    response:
      sla_seconds: 3
      acknowledge_immediately: true
      ack_style: tone_only
    action: start_voice_session
    rate_limit:
      per_user_per_hour: 5
      global_per_minute: 20

  - id: voice-mention-trigger
    source: x
    event: voice_mention
    response:
      sla_seconds: 3
      acknowledge_immediately: true
    action: start_voice_session
    rate_limit:
      per_user_per_hour: 3
      global_per_minute: 10

  - id: spaces-invite-trigger
    source: x
    event: spaces_invite
    response:
      sla_seconds: 5
    action: join_space_as_listener
    safety:
      auto_leave_after_seconds: 180
      require_host_approval: true
      refuse_if_listeners_exceed: 5000
