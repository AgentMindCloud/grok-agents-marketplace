<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" role="img" aria-labelledby="banner-title banner-desc">
  <title id="banner-title">grok-install — The open standard for one-click installable Grok-native agents on X</title>
  <desc id="banner-desc">GrokInstall ecosystem repository hero banner with animated neon circuit traces on a deep black background.</desc>
  <defs>
    
    <radialGradient id="hero-glow" cx="22%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.10"></stop>
      <stop offset="40%" stop-color="#00F0FF" stop-opacity="0.04"></stop>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="repo-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"></stop>
      <stop offset="100%" stop-color="#00F0FF"></stop>
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  
  <rect width="1500" height="500" fill="#0A0A0A"></rect>
  <rect width="1500" height="500" fill="url(#hero-glow)"></rect>

  
  <g stroke="#00F0FF" stroke-width="0.3" stroke-opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="500"></line><line x1="50" y1="0" x2="50" y2="500"></line><line x1="100" y1="0" x2="100" y2="500"></line><line x1="150" y1="0" x2="150" y2="500"></line><line x1="200" y1="0" x2="200" y2="500"></line><line x1="250" y1="0" x2="250" y2="500"></line><line x1="300" y1="0" x2="300" y2="500"></line><line x1="350" y1="0" x2="350" y2="500"></line><line x1="400" y1="0" x2="400" y2="500"></line><line x1="450" y1="0" x2="450" y2="500"></line><line x1="500" y1="0" x2="500" y2="500"></line><line x1="550" y1="0" x2="550" y2="500"></line><line x1="600" y1="0" x2="600" y2="500"></line><line x1="650" y1="0" x2="650" y2="500"></line><line x1="700" y1="0" x2="700" y2="500"></line><line x1="750" y1="0" x2="750" y2="500"></line><line x1="800" y1="0" x2="800" y2="500"></line><line x1="850" y1="0" x2="850" y2="500"></line><line x1="900" y1="0" x2="900" y2="500"></line><line x1="950" y1="0" x2="950" y2="500"></line><line x1="1000" y1="0" x2="1000" y2="500"></line><line x1="1050" y1="0" x2="1050" y2="500"></line><line x1="1100" y1="0" x2="1100" y2="500"></line><line x1="1150" y1="0" x2="1150" y2="500"></line><line x1="1200" y1="0" x2="1200" y2="500"></line><line x1="1250" y1="0" x2="1250" y2="500"></line><line x1="1300" y1="0" x2="1300" y2="500"></line><line x1="1350" y1="0" x2="1350" y2="500"></line><line x1="1400" y1="0" x2="1400" y2="500"></line><line x1="1450" y1="0" x2="1450" y2="500"></line>
    <line x1="0" y1="0" x2="1500" y2="0"></line><line x1="0" y1="50" x2="1500" y2="50"></line><line x1="0" y1="100" x2="1500" y2="100"></line><line x1="0" y1="150" x2="1500" y2="150"></line><line x1="0" y1="200" x2="1500" y2="200"></line><line x1="0" y1="250" x2="1500" y2="250"></line><line x1="0" y1="300" x2="1500" y2="300"></line><line x1="0" y1="350" x2="1500" y2="350"></line><line x1="0" y1="400" x2="1500" y2="400"></line><line x1="0" y1="450" x2="1500" y2="450"></line>
  </g>

  
  <g stroke="#00F0FF" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path class="trace-1" d="M -10 90  L 240 90  L 280 130 L 540 130 L 580 170 L 1510 170"></path>
    <path class="trace-2" d="M -10 410 L 320 410 L 360 370 L 720 370 L 760 410 L 1510 410"></path>
    <path class="trace-3" d="M -10 250 L 110 250 L 150 290 L 410 290 L 450 250 L 810 250 L 850 220 L 1510 220"></path>
    <path class="trace-4" d="M -10 320 L 180 320 L 220 350 L 480 350 L 520 320 L 1080 320 L 1120 290 L 1510 290"></path>
  </g>

  
  <g fill="#00F0FF">
    <circle class="data-1" cx="600" cy="250" r="2.5"></circle>
    <circle class="data-2" cx="600" cy="250" r="2.5"></circle>
    <circle class="data-3" cx="600" cy="250" r="2.5"></circle>
  </g>

  
  <g transform="translate(60, 56)">
    <rect x="-2" y="-14" width="3" height="20" fill="#00F0FF"></rect>
    <text x="12" y="2" font-family="&#39;Space Grotesk&#39;, Inter, sans-serif" font-size="13" font-weight="500" fill="#00F0FF" letter-spacing="3.5">GROKINSTALL</text>
    <text x="12" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#E5E5E5" opacity="0.55" letter-spacing="2">ECOSYSTEM</text>
  </g>

  
  <g transform="translate(60, 230)">
    <text x="0" y="0" font-family="&#39;JetBrains Mono&#39;, &#39;SF Mono&#39;, Consolas, monospace" font-size="84" font-weight="700" fill="url(#repo-text)" letter-spacing="-1.5" filter="url(#neon-glow)">grok-install</text>
    <text x="0" y="59" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#E5E5E5" opacity="0.88">The open standard for one-click installable Grok-native agents on X</text>
  </g>

  
  <g transform="translate(60, 410)">
    <g>
      <rect rx="4" width="172" height="28" fill="#00F0FF" fill-opacity="0.08" stroke="#00F0FF" stroke-opacity="0.45" stroke-width="1"></rect>
      <circle cx="14" cy="14" r="3" fill="#00F0FF"></circle>
      <text x="94" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#00F0FF" text-anchor="middle" letter-spacing="2">GROK 4.20 NATIVE</text>
    </g>
    <g transform="translate(184, 0)">
      <rect rx="4" width="172" height="28" fill="#00FF9D" fill-opacity="0.08" stroke="#00FF9D" stroke-opacity="0.45" stroke-width="1"></rect>
      <circle cx="14" cy="14" r="3" fill="#00FF9D"></circle>
      <text x="94" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#00FF9D" text-anchor="middle" letter-spacing="2">SAFETY CERTIFIED</text>
    </g>
  </g>

  
  <g>
    
    <circle class="ring-1" cx="1300" cy="250" r="80" fill="none" stroke="#00F0FF" stroke-width="1"></circle>
    <circle class="ring-2" cx="1300" cy="250" r="80" fill="none" stroke="#00F0FF" stroke-width="1"></circle>
    
    <circle cx="1300" cy="250" r="100" fill="none" stroke="#00F0FF" stroke-width="0.5" stroke-dasharray="2 6" opacity="0.4"></circle>
    <circle cx="1300" cy="250" r="140" fill="none" stroke="#00F0FF" stroke-width="0.5" stroke-dasharray="2 8" opacity="0.25"></circle>
    
    <line x1="1300" y1="250" x2="1200" y2="160" stroke="#00F0FF" stroke-width="0.6" stroke-opacity="0.4"></line>
    <line x1="1300" y1="250" x2="1400" y2="160" stroke="#00F0FF" stroke-width="0.6" stroke-opacity="0.4"></line>
    <line x1="1300" y1="250" x2="1200" y2="340" stroke="#00F0FF" stroke-width="0.6" stroke-opacity="0.4"></line>
    <line x1="1300" y1="250" x2="1400" y2="340" stroke="#00F0FF" stroke-width="0.6" stroke-opacity="0.4"></line>
    <line x1="1300" y1="250" x2="1180" y2="250" stroke="#00F0FF" stroke-width="0.6" stroke-opacity="0.4"></line>
    <line x1="1300" y1="250" x2="1420" y2="250" stroke="#00F0FF" stroke-width="0.6" stroke-opacity="0.4"></line>
    
    <circle cx="1200" cy="160" r="5" fill="#00FF9D" filter="url(#neon-glow)"></circle>
    <circle cx="1400" cy="160" r="5" fill="#00FF9D" filter="url(#neon-glow)"></circle>
    <circle cx="1200" cy="340" r="5" fill="#00FF9D" filter="url(#neon-glow)"></circle>
    <circle cx="1400" cy="340" r="5" fill="#00FF9D" filter="url(#neon-glow)"></circle>
    <circle cx="1180" cy="250" r="4" fill="#00F0FF" opacity="0.7"></circle>
    <circle cx="1420" cy="250" r="4" fill="#00F0FF" opacity="0.7"></circle>
    
    <g class="node-pulse">
      <circle cx="1300" cy="250" r="14" fill="#00F0FF" filter="url(#neon-glow)"></circle>
      <circle cx="1300" cy="250" r="6" fill="#FFFFFF"></circle>
    </g>
  </g>

  
  <text x="1440" y="478" font-family="Inter, sans-serif" font-size="10" font-weight="400" fill="#FFFFFF" opacity="0.32" text-anchor="end" letter-spacing="0.5">Built for Grok on X · Independent community project</text>
</svg>
