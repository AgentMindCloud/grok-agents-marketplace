    <circle cx="1100" cy="120" r="3.5"/>
  </g>
  <text x="80" y="260" font-family="Space Grotesk, Inter, sans-serif" font-weight="700" font-size="96" letter-spacing="-4" fill="url(#og-wordmark)" filter="url(#og-neon)">GROKINSTALL</text>
  <text x="80" y="340" font-family="Inter, sans-serif" font-weight="600" font-size="40" fill="#FFFFFF">The community marketplace</text>
