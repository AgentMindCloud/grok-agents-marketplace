  </g>
  <g stroke="#00F0FF" stroke-width="1.2" stroke-opacity="0.5" fill="none">
    <path d="M60 520 L260 520 L300 480 L520 480"/>
    <path d="M900 120 L1100 120 L1140 160 L1140 260"/>
