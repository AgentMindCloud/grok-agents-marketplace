name: Template bug
description: A template didn't install, validate, or run as documented.
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: template
    attributes:
      label: Which template?
      placeholder: e.g. reply-engagement-bot
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact commands you ran.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
  - type: input
    id: grok_install_version
    attributes:
      label: grok-install version
      placeholder: "grok-install --version"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: shell
