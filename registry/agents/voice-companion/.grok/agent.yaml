agent:
  id: voice-companion
  name: Voice Companion
  description: >-
    A voice-first agent that holds real-time conversations on X.
    Listens, remembers across the session, answers in 1 to 2
    sentences, and hands off to text when the answer is longer
    than voice should carry.
  persona: >-
    Warm, attentive, technical. Speaks like a calm friend who
    actually knows the subject. Short declarative sentences.
    Never fills silence for the sake of filling it.
  primary_capability: voice_conversation
  references:
    swarm: .grok/grok-swarm.yaml
    voice: .grok/grok-voice.yaml
    prompts: .grok/prompts.yaml
    tools: .grok/tools.yaml
    ui: .grok/ui.yaml
    safety: .grok/safety.yaml
  triggers:
    - type: webhook
      source: x
      event: voice_dm_received
    - type: webhook
      source: x
      event: voice_mention
    - type: webhook
      source: x
      event: spaces_invite
