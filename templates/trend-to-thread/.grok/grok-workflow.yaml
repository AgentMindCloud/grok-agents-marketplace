workflow:
  id: trend_to_thread
  config:
    topics:
      - ai
      - developer-tools
      - open-source
    min_score: 0.65
  steps:
    - id: scout_trends
      agent: scout
      input:
        topics: "{{ config.topics }}"
      output: trends

    - id: pick_winner
      type: filter
      input: "{{ trends }}"
      where: "score >= {{ config.min_score }}"
      limit: 1
      output: winner

    - id: write_thread
      agent: author
      input:
        trend: "{{ winner }}"
      output: draft

    - id: human_review
      type: approval
      target: draft

    - id: publish
      agent: poster
      when: "{{ draft.approved }}"
      input:
        thread: "{{ draft }}"
