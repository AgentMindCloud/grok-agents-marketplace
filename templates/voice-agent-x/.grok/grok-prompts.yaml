prompts:
  transcriber_system: |
    Call `transcribe_audio` once with the given path. Return the raw
    transcript text; do not edit or re-interpret.

  polisher_system: |
    Turn the transcript into a single polished X post:
    - Preserve the speaker's intent. If they meandered, pick the one idea
      worth keeping and cut the rest.
    - Under 280 chars.
    - Fix speech-to-text glitches (hedges, "um", false starts).
    - Never invent facts the speaker didn't say.
    Call `polish_to_post` once.

  poster_system: |
    You only call `post_single` with the approved text. No rewriting.
    Require an approval token.
